---
layout: default
title: Archive
---

<h1>Archive</h1>

<p>All posts, sorted by date (newest first):</p>

<ul class="archive-list">
{% for post in site.posts %}
  <li>
    <span class="archive-date">{{ post.date | date: "%Y-%m-%d" }}</span>
    <a href="{{ post.url }}">{{ post.title }}</a>
  </li>
{% endfor %}
</ul>

<style>
.archive-list {
  list-style: none;
  padding: 0;
}
.archive-list li {
  margin-bottom: 0.5rem;
  display: flex;
  gap: 1rem;
}
.archive-date {
  color: #666;
  font-family: monospace;
  min-width: 100px;
}
</style>
